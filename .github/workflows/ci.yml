name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install shellcheck
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then SC_ARCH="aarch64"; else SC_ARCH="x86_64"; fi
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.${SC_ARCH}.tar.xz" | tar -xJ
          sudo mv shellcheck-stable/shellcheck /usr/local/bin/shellcheck

      - name: Install pre-commit hooks
        run: uv run pre-commit install

      - name: Lint
        run: task lint

      - name: Test
        run: task test
